services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: techfusion-postgres
    environment:
      POSTGRES_USER: techfusion
      POSTGRES_PASSWORD: techfusion
      POSTGRES_DB: techfusion
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - techfusion
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techfusion"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: techfusion-redis
    ports:
      - "6379:6379"
    networks:
      - techfusion
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ../..
      dockerfile: apps/api-gateway/Dockerfile
    container_name: techfusion-api-gateway
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      NODE_ENV: development
      DATABASE_URL: postgresql://techfusion:techfusion@postgres:5432/techfusion
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - techfusion

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    container_name: techfusion-web
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - api-gateway
    networks:
      - techfusion

  worker:
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile
    container_name: techfusion-worker
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - techfusion

volumes:
  postgres-data:

networks:
  techfusion:
    driver: bridge
