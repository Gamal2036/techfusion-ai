{{- if and .Values.prometheus.enabled .Values.prometheus.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "techfusion.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "techfusion.labels" . | nindent 4 }}
    release: prometheus
spec:
  selector:
    matchLabels:
      {{- include "techfusion.name" . | nindent 6 }}
  namespaceSelector:
    matchNames:
      - {{ .Values.namespace }}
  endpoints:
    - port: metrics
      interval: 15s
      path: /metrics
    - port: http
      interval: 30s
      path: /health
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "techfusion.fullname" . }}-prometheus-rules
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "techfusion.labels" . | nindent 4 }}
data:
  techfusion-alerts.yaml: |
    groups:
      - name: techfusion
        rules:
          - alert: HighErrorRate
            expr: rate(http_requests_duration_seconds_count{status_code=~"5.."}[5m]) / rate(http_requests_duration_seconds_count[5m]) > 0.05
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: 'High error rate on {{"{{"}} $labels.service {{"}}"}}'
          - alert: HighLatency
            expr: histogram_quantile(0.95, rate(http_requests_duration_seconds_bucket[5m])) > 2
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: 'High latency on {{"{{"}} $labels.service {{"}}"}}'
          - alert: QueueDepthTooHigh
            expr: bullmq_queue_depth > 1000
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Queue depth too high"
          - alert: AICostSpike
            expr: rate(ai_provider_cost_usd_total[1h]) > 10
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "AI provider cost spike detected"
{{- end }}
