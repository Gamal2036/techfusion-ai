{{- if .Values.otelCollector.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "techfusion.fullname" . }}-otel-collector
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "techfusion.serviceLabels" . | nindent 4 }}
    app.kubernetes.io/component: otel-collector
spec:
  type: ClusterIP
  ports:
    - port: 4317
      targetPort: 4317
      name: otlp-grpc
    - port: 4318
      targetPort: 4318
      name: otlp-http
    - port: 8888
      targetPort: 8888
      name: metrics
    - port: 8889
      targetPort: 8889
      name: prom-export
  selector:
    app.kubernetes.io/name: {{ include "techfusion.name" . }}
    app.kubernetes.io/component: otel-collector
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "techfusion.fullname" . }}-otel-collector
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "techfusion.serviceLabels" . | nindent 4 }}
    app.kubernetes.io/component: otel-collector
spec:
  replicas: {{ .Values.otelCollector.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "techfusion.name" . }}
      app.kubernetes.io/component: otel-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "techfusion.name" . }}
        app.kubernetes.io/component: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: {{ .Values.otelCollector.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
            - containerPort: 8888
              name: metrics
            - containerPort: 8889
              name: prom-export
          args:
            - "--config=/etc/otel/config.yaml"
          resources:
            {{- toYaml .Values.otelCollector.resources | nindent 12 }}
          volumeMounts:
            - mountPath: /etc/otel
              name: otel-config
      volumes:
        - name: otel-config
          configMap:
            name: {{ include "techfusion.fullname" . }}-otel-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "techfusion.fullname" . }}-otel-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "techfusion.labels" . | nindent 4 }}
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch:
        timeout: 1s
        send_batch_size: 1024
      memory_limiter:
        check_interval: 1s
        limit_mib: 400
    exporters:
      prometheus:
        endpoint: 0.0.0.0:8889
        namespace: techfusion
      logging:
        loglevel: warn
      otlp:
        endpoint: "{{ include "techfusion.fullname" . }}-prometheus-server:9090"
        tls:
          insecure: true
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [logging, otlp]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [prometheus, logging]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [logging]
{{- end }}
