apiVersion: v1
kind: Secret
metadata:
  name: {{ include "techfusion.fullname" . }}-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "techfusion.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.postgresql.user | default "techfusion" }}
  JWT_SECRET: {{ "change-me-in-production" | b64enc }}
  JWT_REFRESH_SECRET: {{ "change-me-in-production-refresh" | b64enc }}
  ENCRYPTION_KEY: {{ "00000000000000000000000000000000" | b64enc }}
  STRIPE_SECRET_KEY: ""
  STRIPE_WEBHOOK_SECRET: ""
  POSTGRES_USER: {{ .Values.postgresql.user }}
  POSTGRES_DB: {{ .Values.postgresql.database }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "techfusion.fullname" . }}-postgres-credentials
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "techfusion.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.postgresql.user }}
  POSTGRES_PASSWORD: {{ .Values.postgresql.user | default "techfusion" }}
  POSTGRES_DB: {{ .Values.postgresql.database }}
