apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "techfusion.fullname" . }}-worker
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "techfusion.serviceLabels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "techfusion.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "techfusion.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9464"
    spec:
      containers:
        - name: worker
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.worker.containerPort }}
              name: http
            - containerPort: 9464
              name: metrics
          env:
            {{- range $key, $val := .Values.worker.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            - name: REDIS_URL
              value: "redis://{{ include "techfusion.fullname" . }}-redis:6379"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://{{ include "techfusion.fullname" . }}-otel-collector:4317"
            - name: OTEL_SERVICE_NAME
              value: "techfusion-worker"
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "techfusion.fullname" . }}-worker
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "techfusion.serviceLabels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.worker.port }}
      targetPort: http
      name: http
    - port: 9464
      targetPort: metrics
      name: metrics
  selector:
    {{- include "techfusion.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: worker
