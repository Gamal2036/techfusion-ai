apiVersion: v2
name: techfusion
description: TechFusion AI - Unified IT Management Platform
type: application
version: 0.1.0
appVersion: "0.1.0"
sources:
  - https://github.com/techfusion-ai/platform
keywords:
  - it-management
  - ai-troubleshooting
  - device-health
  - cybersecurity
maintainers:
  - name: TechFusion Team
    email: devops@techfusion.ai
dependencies:
  - name: prometheus
    version: "~25.0"
    repository: https://prometheus-community.github.io/helm-charts
    condition: prometheus.enabled
  - name: grafana
    version: "~8.0"
    repository: https://grafana.github.io/helm-charts
    condition: grafana.enabled
  - name: loki
    version: "~6.0"
    repository: https://grafana.github.io/helm-charts
    condition: loki.enabled
  - name: cert-manager
    version: "~1.15"
    repository: https://charts.jetstack.io
    condition: cert-manager.enabled
