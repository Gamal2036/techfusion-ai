name: CD - Production Deploy

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag to deploy (e.g., git SHA)"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  KUBE_NAMESPACE: techfusion-production
  HELM_RELEASE: techfusion-prod
  HELM_CHART_PATH: infra/k8s

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.15.0"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.30.0"

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_PRODUCTION }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Add Helm repos
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo add jetstack https://charts.jetstack.io
          helm repo update

      - name: Deploy with Helm
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} ${{ env.HELM_CHART_PATH }} \
            --namespace ${{ env.KUBE_NAMESPACE }} \
            --create-namespace \
            --values ${{ env.HELM_CHART_PATH }}/values-production.yaml \
            --set global.environment=production \
            --set image.tag=${{ github.event.inputs.tag }} \
            --set image.repository=${{ env.REGISTRY }}/${{ github.repository }} \
            --wait --timeout 15m

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/${HELM_RELEASE}-api-gateway -n ${{ env.KUBE_NAMESPACE }} --timeout=10m
          kubectl rollout status deployment/${HELM_RELEASE}-web -n ${{ env.KUBE_NAMESPACE }} --timeout=10m
          kubectl rollout status deployment/${HELM_RELEASE}-worker -n ${{ env.KUBE_NAMESPACE }} --timeout=10m
          kubectl get pods -n ${{ env.KUBE_NAMESPACE }}

      - name: Smoke test
        run: |
          sleep 15
          kubectl run smoke-test --image=curlimages/curl:latest \
            -n ${{ env.KUBE_NAMESPACE }} --restart=Never --rm -it \
            -- curl -sf http://${HELM_RELEASE}-api-gateway:3001/health
